<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Odaily Home Preview</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #1a1a1a;
        color: #222426;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      }

      .preview {
        display: grid;
        grid-template-columns: repeat(2, 628px);
        gap: 28px;
        min-height: 100vh;
        padding: 28px;
        align-items: start;
      }

      .preview__frame {
        position: relative;
        width: 628px;
        height: 796px;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      }

      /* Wallpapers behind glass elements */
      .preview__frame::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        background-size: cover;
        background-position: center;
      }

      .theme-light.preview__frame::before {
        background:
          radial-gradient(ellipse at 30% 20%, rgba(255, 180, 100, 0.3), transparent 50%),
          radial-gradient(ellipse at 70% 60%, rgba(100, 180, 255, 0.2), transparent 50%),
          radial-gradient(ellipse at 50% 80%, rgba(180, 120, 220, 0.15), transparent 40%),
          linear-gradient(135deg, #e8ddd0, #f2f1ef, #dce5e8);
      }

      .theme-dark.preview__frame::before {
        background:
          radial-gradient(ellipse at 30% 20%, rgba(120, 80, 180, 0.25), transparent 50%),
          radial-gradient(ellipse at 70% 60%, rgba(40, 100, 200, 0.2), transparent 50%),
          radial-gradient(ellipse at 50% 90%, rgba(200, 80, 100, 0.15), transparent 40%),
          linear-gradient(160deg, #0a0a12, #000000, #06060e);
      }

      .preview__frame .odaily-home {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        background: transparent !important;
      }

      .preview__frame .odaily-home__shell {
        padding-top: 44px;
      }
    </style>
  </head>

            <button class="odaily-home__search" type="button">
              <span class="odaily-home__search-icon">
                <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

              <h2>最近打开的文档</h2>

    <script>
      const today = new Date();
      const docs = [
        ["", "18 分钟前"],
        ["今天, 5月11日 周一", "1 小时前"],
        ["5月9日 周六", "1 天前"],
        ["Craft Handbook 📖", "1 天前"],
        ["Getting Started 👋", "1 天前"],
        ["How To Videos 📺", "1 天前"]
      ];

      document.querySelectorAll("[data-preview-month]").forEach((node) => {
        node.textContent = `${today.getMonth() + 1}月`;
      });

      document.querySelectorAll("[data-preview-day]").forEach((node) => {
        node.textContent = String(today.getDate());
      });

      document.querySelectorAll("[data-preview-list]").forEach((list) => {
        docs.forEach(([title, meta], index) => {
          const item = document.createElement("button");
          item.className = "odaily-home__recent-item";
          item.type = "button";
          item.innerHTML = `
            <div class="odaily-home__thumb odaily-home__thumb--${index % 4}">
              <span></span><span></span><span></span>
            </div>
            <div class="odaily-home__recent-body">
              <div class="odaily-home__recent-title">${title}</div>
              <div class="odaily-home__recent-meta">${meta}</div>
            </div>
          `;
          list.appendChild(item);
        });
      });
    </script>
